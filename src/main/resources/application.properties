spring.application.name=shipping

server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/shipping
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Importar secretos JWT
spring.config.import=optional:file:./secrets.properties

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# permite que los enums sean leidos sin importar las mayusculas
spring.jackson.mapper.accept-case-insensitive-enums=true
